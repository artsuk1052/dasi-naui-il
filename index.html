<style>
  :root{
    --bg:#fff8f1;
    --card:#ffffff;
    --ink:#4c4450;
    --ink-soft:#8a8092;
    --line:#f3e7dc;
    --shadow:0 6px 20px rgba(205,160,155,.16);
    --radius:22px;

    /* 파스텔 3색 (노랑·분홍·연두) */
    --pink:#ff9db6;   --pink-deep:#e0648c;  --pink-soft:#ffe7ee;
    --yellow:#ffd24d; --yellow-deep:#eaad00; --yellow-soft:#fff4cf;
    --green:#9ed77a;  --green-deep:#5aa834;  --green-soft:#ebf8de;

    /* 기존 규칙 호환 별칭 */
    --brand:var(--pink); --brand-deep:var(--pink-deep); --brand-soft:var(--pink-soft);

    --fs:18px;         /* 조절 가능한 기준 글씨 크기 */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Jua',"Malgun Gothic","맑은 고딕",-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    font-size:var(--fs);
    line-height:1.75;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px; margin:0 auto; padding:0 16px 60px;}

  /* ---------- 상단바 ---------- */
  header.topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(120deg,var(--pink),var(--yellow)); color:#5a3f49;
    padding:14px 16px; box-shadow:var(--shadow);
  }
  header.topbar .inner{max-width:560px; margin:0 auto; display:flex; align-items:center; gap:10px;}
  header.topbar h1{font-size:1.18rem; margin:0; font-weight:400; letter-spacing:-.3px; flex:1;}
  .fontctrl{display:flex; gap:6px;}
  .fontctrl button{
    background:rgba(255,255,255,.55); color:#5a3f49; border:0; border-radius:12px;
    width:40px; height:40px; font-size:1rem; cursor:pointer;
  }
  .fontctrl button:active{background:rgba(255,255,255,.85);}

  /* ---------- 희망리턴 배너 ---------- */
  .hope-banner{
    background:linear-gradient(135deg,#fff3d6,#ffe6c9);
    border:1px solid #ffdca0; border-radius:var(--radius);
    padding:14px 16px; margin:16px 0; box-shadow:var(--shadow);
  }
  .hope-banner b{color:#c07a12;}
  .hope-banner .small{font-size:.86em; color:#8a6526; margin-top:4px;}

  /* ---------- 공통 카드 ---------- */
  .card{
    background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:22px 20px; margin:16px 0;
    box-shadow:var(--shadow);
  }
  h2.q{font-size:1.4rem; margin:0 0 6px; letter-spacing:-.5px; line-height:1.45;}
  .qsub{color:var(--ink-soft); margin:0 0 18px; font-size:.95em;}

  /* ---------- 진행 표시 ---------- */
  .progress{margin:18px 0 4px;}
  .progress .bar{height:14px; background:var(--pink-soft); border-radius:999px; overflow:hidden;}
  .progress .fill{height:100%; background:linear-gradient(90deg,var(--pink),var(--yellow)); border-radius:999px; transition:width .3s ease; width:0%;}
  .progress .label{font-size:.85em; color:var(--ink-soft); margin-top:6px; text-align:right;}

  /* ---------- 선택 버튼 ---------- */
  .options{display:flex; flex-direction:column; gap:12px; margin-top:6px;}
  .opt{
    display:flex; align-items:center; gap:14px;
    background:#fff; border:2px solid var(--line); border-radius:16px;
    padding:16px 18px; font-size:1.1rem; font-weight:400; color:var(--ink);
    cursor:pointer; text-align:left; transition:all .12s ease; width:100%;
  }
  .opt .emo{font-size:1.5rem; line-height:1;}
  .opt .txt{flex:1;}
  .opt .desc{display:block; font-size:.8rem; color:var(--ink-soft); margin-top:2px;}
  .opt:hover{border-color:var(--pink);}
  .opt:active{transform:scale(.98);}
  .opt.sel{border-color:var(--pink); background:var(--pink-soft);}
  .opt.sel::after{content:"✓"; color:var(--pink-deep); font-weight:900; font-size:1.2rem;}

  /* ---------- 하단 네비 ---------- */
  .nav{display:flex; gap:12px; margin-top:22px;}
  .btn{
    flex:1; border:0; border-radius:16px; padding:16px; font-size:1.15rem;
    font-weight:400; cursor:pointer; letter-spacing:-.3px;
  }
  .btn.primary{background:linear-gradient(180deg,#ffdb62,#ffc42e); color:#6b4e0c;}
  .btn.primary:disabled{background:#efe6d6; color:#bcb3a2; cursor:not-allowed;}
  .btn.ghost{background:#ffeaf0; color:var(--pink-deep); flex:0 0 auto; padding:16px 20px;}
  .btn:active{transform:scale(.98);}

  /* ---------- 시작 화면 ---------- */
  .hero{text-align:center; padding:26px 20px;}
  .hero .emo{font-size:3rem;}
  .hero h2{font-size:1.7rem; margin:10px 0 6px; letter-spacing:-.5px;}
  .hero p{color:var(--ink-soft); margin:0 0 6px;}
  .hero ul{text-align:left; color:var(--ink-soft); font-size:.95em; padding-left:20px; margin:14px 0;}

  /* ---------- 리포트 ---------- */
  .report-head{text-align:center; padding:8px 0 2px;}
  .report-head .emo{font-size:2.4rem;}
  .report-head h2{font-size:1.55rem; margin:6px 0 2px;}
  .sec{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin:14px 0; overflow:hidden; box-shadow:var(--shadow);
  }
  .sec > button.sec-h{
    width:100%; text-align:left; background:none; border:0; cursor:pointer;
    padding:18px 18px; font-size:1.25rem; font-weight:400; color:var(--ink);
    display:flex; align-items:center; gap:10px; letter-spacing:-.3px;
  }
  .sec > button.sec-h .chev{margin-left:auto; transition:transform .2s; color:var(--pink-deep); font-size:1rem;}
  .sec.open > button.sec-h .chev{transform:rotate(180deg);}
  .sec-body{padding:0 18px 20px; display:none;}
  .sec.open .sec-body{display:block;}
  .sec-body p{margin:0 0 10px;}

  .job{border-left:6px solid var(--yellow-deep); background:var(--yellow-soft);
       border-radius:14px; padding:12px 14px; margin:10px 0;}
  .job .rank{font-weight:900; color:#a9730f;}
  .job .why{font-size:.92em; color:var(--ink-soft); margin-top:3px;}

  .strength{background:var(--green-soft); border-left:6px solid var(--green);
            border-radius:14px; padding:12px 14px; margin:10px 0;}
  .strength b{color:var(--green-deep);}

  table.certs{width:100%; border-collapse:collapse; margin-top:6px; font-size:.92em;}
  table.certs th,table.certs td{border-bottom:1px solid var(--line); padding:9px 6px; text-align:left; vertical-align:top;}
  table.certs th{color:var(--ink-soft); font-weight:400; font-size:.85em;}
  .stars{color:#eaad00; letter-spacing:2px; white-space:nowrap;}

  .steps{display:flex; flex-direction:column; gap:10px; margin-top:4px;}
  .stp{background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px;}
  .stp .tag{display:inline-block; background:var(--yellow-deep); color:#4d3800; border-radius:10px;
            font-size:.82em; padding:3px 12px; margin-bottom:6px;}
  .stp.s2 .tag{background:var(--green-deep); color:#fff;}
  .stp.s3 .tag{background:var(--pink-deep); color:#fff;}

  .inst{margin:8px 0; padding-left:2px;}
  .inst li{margin:6px 0;}
  .inst b{color:var(--pink-deep);}
  .first-step{background:linear-gradient(135deg,var(--green),var(--green-deep)); color:#fff; border-radius:16px; padding:16px 18px;
              font-size:1.15rem; text-align:center; letter-spacing:-.3px;}
  .cheer{font-size:1.2rem; color:var(--pink-deep); text-align:center;
         padding:6px 10px; line-height:1.6;}

  /* ---------- 용어 도움말 ---------- */
  .term{border-bottom:2px dotted var(--pink); cursor:pointer; color:var(--pink-deep);}
  #tipbox{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    max-width:520px; width:calc(100% - 32px); background:#5b4650; color:#fff;
    border-radius:18px; padding:16px 18px; box-shadow:0 8px 30px rgba(80,50,60,.35);
    z-index:50; display:none; font-size:1rem; line-height:1.6;
  }
  #tipbox b{color:#ffd76a; display:block; margin-bottom:4px;}
  #tipbox .close{float:right; background:rgba(255,255,255,.22); border:0; color:#fff;
                 border-radius:10px; width:32px; height:32px; cursor:pointer;}

  /* ---------- 앱 설치 ---------- */
  .install-box{
    background:var(--green-soft); border:1px solid #cae9b0; border-radius:var(--radius);
    padding:16px 18px; margin:16px 0; box-shadow:var(--shadow);
  }
  .install-box b{color:var(--green-deep);}
  .install-box .btn.install{background:linear-gradient(180deg,var(--green),var(--green-deep)); color:#fff; width:100%; margin-top:10px;}
  .install-box ol{margin:8px 0 0; padding-left:22px; color:var(--ink-soft); font-size:.95em;}
  .install-box ol li{margin:5px 0;}
  .install-box .share{display:inline-block; background:#fff; border:1px solid var(--line);
    border-radius:10px; padding:1px 8px; color:var(--pink-deep);}
  .disclaimer{font-size:.82em; color:var(--ink-soft); text-align:center; margin:20px 4px; line-height:1.6;}
  .report-actions{display:flex; gap:12px; margin:18px 0 6px;}

  @media print{
    header.topbar,.nav,.report-actions,.fontctrl,#tipbox,.hope-banner .small{display:none !important;}
    body{background:#fff;}
    .sec-body{display:block !important;}
    .sec{break-inside:avoid; box-shadow:none;}
    .card,.sec{border-color:#ccc;}
  }
</style>
</head>

<header class="topbar">
  <div class="inner">
    <h1>다시, 나의 일 🌅</h1>

<script>
/* =========================================================
   폐업 소상공인 재취업 컨설팅 — 규칙 기반 엔진
   외부 라이브러리 없음 · 오프라인 동작 · 데이터는 저장하지 않음
   ========================================================= */

/* ---------- 용어 사전 (❔ 도움말) ---------- */
const GLOSSARY = {
  "국민내일배움카드":"정부가 직업훈련비를 대신 내주는 카드예요. 발급받으면 정해진 한도 안에서 다양한 국비(무료·저비용) 교육을 들을 수 있어요. HRD-Net 홈페이지에서 신청합니다.",
  "HRD-Net":"고용노동부가 운영하는 직업훈련 포털이에요. 어떤 교육이 국비 지원되는지 찾고 신청할 수 있어요. (www.hrd.go.kr)",
  "희망리턴패키지":"폐업(하려는·한) 소상공인만을 위한 정부 지원이에요. 사업 정리 컨설팅 + 재취업·재창업 교육 + 전직장려수당을 함께 지원합니다. 소상공인시장진흥공단에서 운영해요.",
  "큐넷":"국가기술자격 시험을 접수하는 곳이에요. 지게차·전기·조리·공인중개사 등 시험 원서를 여기서 냅니다. (Q-Net, www.q-net.or.kr)",
  "학점은행제":"학교를 다시 다니지 않고도 학점을 쌓아 자격(예: 사회복지사 2급)이나 학위를 딸 수 있는 제도예요.",
  "K-Digital":"디지털·AI 분야를 무료로 배우는 국비 훈련 과정이에요. 온라인 판매, 데이터 등 요즘 수요가 많은 기술을 가르쳐요.",
  "폴리텍":"한국폴리텍대학. 기술 직무를 실습 위주로 배우는 국립 교육기관이에요. 전기·기계·설비 같은 손기술 분야에 강해요.",
  "전직장려수당":"다니던 사업을 접고 취업 등 새 길로 갈 때 정부가 주는 지원금이에요. 희망리턴패키지 안에 들어 있어요.",
  "주택관리사":"아파트 등 공동주택의 관리소장이 될 수 있는 국가자격이에요. 안정적인 수요가 있는 편이에요.",
  "물류관리사":"물건의 보관·운송·재고를 효율적으로 관리하는 국가자격이에요. 택배·이커머스가 커지며 수요가 늘고 있어요.",
  "풀필먼트":"온라인 주문이 들어오면 보관·포장·배송까지 대신 처리해 주는 물류 서비스예요.",
  "라이브커머스":"실시간 방송으로 상품을 소개하며 파는 방식이에요. 홈쇼핑의 인터넷·스마트폰 버전이라고 보면 돼요.",
  "생활지원사":"홀로 지내는 어르신 댁을 방문해 안부를 살피고 생활을 돕는 일이에요. 노인일자리 사업으로 많이 뽑아요.",
  "슈퍼바이저":"여러 매장이나 직원을 관리·감독하는 중간 관리자예요. 장사하며 직원을 다뤄 본 경험이 그대로 쓰여요."
};

/* ---------- 자격/기술 데이터 ---------- */
const CERTS = {
  care:      {name:"요양보호사",            dur:"240시간 · 2~3개월", star:1, where:"요양보호사 교육원, {HRD-Net}"},
  social:    {name:"사회복지사 2급",         dur:"1~2년 ({학점은행})", star:2, where:"학점은행제 평생교육원"},
  house:     {name:"{주택관리사}(보)",       dur:"6~12개월",         star:3, where:"온라인 강의, {큐넷}(시험)"},
  realtor:   {name:"공인중개사",            dur:"6~12개월",         star:3, where:"온라인 강의, {큐넷}(시험)"},
  electric:  {name:"전기기능사",            dur:"3~6개월",          star:2, where:"{폴리텍}, {HRD-Net}"},
  logistics: {name:"{물류관리사}",           dur:"3~4개월",          star:2, where:"{HRD-Net}, {큐넷}(시험)"},
  forklift:  {name:"지게차운전기능사",       dur:"1~2개월",          star:1, where:"{폴리텍}, 국비학원, {큐넷}(시험)"},
  cook:      {name:"조리기능사(한식)",       dur:"2~3개월",          star:2, where:"국비학원, {큐넷}(시험)"},
  computer:  {name:"컴퓨터활용능력 2급",     dur:"1~2개월",          star:1, where:"국비학원, 대한상공회의소"},
  smartstore:{name:"스마트스토어·SNS마케팅", dur:"1~2개월 (비자격)",  star:1, where:"{K-Digital}, 인프런·클래스101"},
  drive:     {name:"1종·버스·화물 운전자격", dur:"1~3개월",          star:1, where:"운전전문학원, {큐넷}(일부)"},
  safety:    {name:"산업안전(산업안전기사 등)",dur:"4~8개월",         star:3, where:"{HRD-Net}, {큐넷}(시험)"}
};

/* ---------- 10년 성장 지도(메가트렌드) ---------- */
const TRENDS = {
  aging:{ icon:"🧓", name:"초고령사회 — 돌봄·실버산업",
    s1:"{요양보호사}·요양시설 종사자로 취업 (수요가 가장 많고 나이가 강점)",
    s2:"경력을 쌓으며 {사회복지사} 2급 취득 → 사회복지·케어 실무자로",
    s3:"주야간보호센터 관리자, 또는 시니어케어 사업(재창업)으로 도약" },
  digital:{ icon:"🛒", name:"디지털 전환 — 온라인 유통",
    s1:"스마트스토어 셀러로 시작 (사장 시절 상품·고객 감각을 그대로 활용)",
    s2:"자사몰·브랜드를 키우고 {라이브커머스}로 매출 확대",
    s3:"소상공인 온라인 전환을 돕는 컨설턴트·강사로 도약" },
  energy:{ icon:"🌱", name:"탄소중립 — 에너지 전환",
    s1:"전기기능사로 시설·전기 분야 취업",
    s2:"태양광·전기차 충전 인프라 시공 경력 쌓기",
    s3:"에너지 설비 관리 전문가로 도약" },

function fsAdjust(delta){
  const root=document.documentElement;
  let cur=parseFloat(getComputedStyle(root).getPropertyValue('--fs'))||18;
  cur=Math.min(26, Math.max(15, cur+delta));
  root.style.setProperty('--fs', cur+'px');
}
document.getElementById('fs-up').onclick=()=>fsAdjust(2);
document.getElementById('fs-down').onclick=()=>fsAdjust(-2);

/* 용어 도움말 */
function linkTerms(text){
  // {용어} 형태를 클릭 가능한 도움말로 변환
  return text.replace(/\{([^}]+)\}/g, (m,term)=>{
    const key=term.replace(/\(.+\)/,'').trim();
    if(GLOSSARY[key]) return `<span class="term" data-term="${key}">${term}</span>`;
    return term;
  });
}
function bindTerms(scope){
  scope.querySelectorAll('.term').forEach(el=>{
    el.onclick=()=>showTip(el.dataset.term);
  });
}
const tipbox=document.getElementById('tipbox');
function showTip(key){
  document.getElementById('tip-content').innerHTML=`<b>${key}</b>${GLOSSARY[key]||''}`;
  tipbox.style.display='block';
}
document.getElementById('tip-close').onclick=()=>tipbox.style.display='none';

  const url = location.href.split('#')[0];
  const done = ()=>{ if(btn){ btn.textContent='주소가 복사됐어요 ✓'; } };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>prompt('아래 주소를 길게 눌러 복사하세요', url));

    prompt('아래 주소를 길게 눌러 복사하세요', url);
  }
}

function renderQuestion(){
  const Q=QUESTIONS[step];
  const val=answers[Q.key];
  const pct=Math.round((step)/QUESTIONS.length*100);
  const optsHtml=Q.opts.map(o=>{
    const sel=Q.multi ? (answers[Q.key]||[]).includes(o.v) : val===o.v;
    return `<button class="opt ${sel?'sel':''}" data-v='${JSON.stringify(o.v)}'>
      <span class="emo">${o.e}</span>
      <span class="txt">${o.t}${o.desc?`<span class="desc">${o.desc}</span>`:''}</span>
    </button>`;
  }).join('');

  const canNext = Q.multi ? (answers[Q.key]||[]).length>0 : (val!==undefined);

  app.innerHTML=`
    <div class="progress">
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      <div class="label">${step+1} / ${QUESTIONS.length} 단계</div>
    </div>
    <div class="card">
      <h2 class="q">${Q.emoji} ${Q.q}</h2>
      ${Q.sub?`<p class="qsub">${Q.sub}</p>`:''}
      <div class="options">${optsHtml}</div>
      <div class="nav">
        <button class="btn ghost" id="prev">◀ 이전</button>
        <button class="btn primary" id="next" ${canNext?'':'disabled'}>${step===QUESTIONS.length-1?'결과 보기 🎉':'다음 ▶'}</button>
      </div>
    </div>
  `;

  app.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick=()=>{
      const v=JSON.parse(btn.dataset.v);
      if(Q.multi){
        const arr=answers[Q.key]||[];
        const i=arr.indexOf(v);
        if(i>=0) arr.splice(i,1); else arr.push(v);
        answers[Q.key]=arr;
        renderQuestion();
      }else{
        answers[Q.key]=v;
        // 단일 선택은 살짝 뒤 자동 진행
        renderQuestion();
        setTimeout(()=>{ if(step<QUESTIONS.length-1){step++;render();} }, 220);
      }
    };
  });
  document.getElementById('prev').onclick=()=>{ if(step===0){step=-1;} else {step--;} render(); };
  document.getElementById('next').onclick=()=>{ if(!canNext)return; step++; render(); };
}

/* ================= 리포트 엔진 ================= */
function scoreJobs(){
  const a=answers;
  const band=a.age;
  const str=a.strengths||[];
  return JOBS.map(job=>{
    let s=0; const reasons=[];
    // 나이 적합
    if(job.bands.includes(band)){ s+=4; }
    else if(job.bands.includes(band-1)||job.bands.includes(band+1)){ s+=1.5; }
    else { s-=1; }
    // 강점 매칭
    const matched=job.skill.filter(k=>str.includes(k));
    s+=matched.length*2.2;
    // 건강 (몸 쓰는 일)
    if(job.physical>=2 && a.health===0) s-=4;
    else if(job.physical>=2 && a.health===1) s-=1.5;
    else if(job.physical<=1 && a.health===0) s+=1;
    // 디지털
    if(job.digital>=2 && a.digital===0) s-=3;
    else if(job.digital>=2 && a.digital===2) s+=1.5;
    else if(job.digital===0 && a.digital===0) s+=0.8;
    // 소득 급한 정도 → 빨리 되는 일 가점
    if(a.urgency==='now'){ s += job.fast?2:-1.5; }
    else if(a.urgency==='ready'){ s += job.fast?-0.3:1.2; }
    // 희망 소득 근접도
    const gap=Math.abs((job.income)-(a.income||200));
    s += gap<=50?1 : gap<=120?0 : -1;
    // 업종 보너스
    if(a.industry==='food'&&job.id==='cook') s+=2.5;
    if((a.industry==='retail'||a.industry==='whole')&&(job.id==='smartstore'||job.id==='logi')) s+=1.5;
    if(a.industry==='service'&&job.id==='care') s+=1;
    // 건강 문제로 폐업 → 몸 덜 쓰는 일 살짝 우대
    if(a.reason==='health' && job.physical<=1) s+=1;
    return {job, s, matched};
  }).sort((x,y)=>y.s-x.s);
}

function stars(n){ return "★".repeat(n)+"☆".repeat(3-n); }
